{% extends "base_layout.html" %}

{% block title %}Signup{% endblock title %}

{% block content %}
<main class="auth-page">
    <section class="auth-card">
        <h1>Signup</h1>
        <p class="auth-lead">Создайте аккаунт, чтобы работать с сайтом как авторизованный пользователь.</p>

        <form class="form auth-form" action="{% url 'signup' %}" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Sign Up</button>
        </form>
    </section>
</main>
{% endblock content %}
